<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WeBuild</title>
<meta name="description" content="WeBuild - Developer Workflow Tool"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#3a3a3a;color:#fff;min-height:100vh;overflow:hidden}

/* ===== LOGIN PAGE ===== */
#loginPage{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#3a3a3a}
#loginPage h1{font-size:42px;font-weight:900;color:#00C310;margin-bottom:32px;letter-spacing:1px}
.login-card{background:#1a1a1a;border:1px solid #555;border-radius:16px;padding:40px 48px;display:flex;flex-direction:column;gap:20px;min-width:380px;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.login-card input{background:#1a1a1a;border:1px solid #666;border-radius:8px;padding:14px 18px;color:#fff;font-size:15px;outline:none;transition:border-color .2s}
.login-card input:focus{border-color:#00C310}
.login-card input::placeholder{color:#888}
.login-card button{background:#00C310;color:#fff;border:none;border-radius:20px;padding:12px 32px;font-size:16px;font-weight:700;cursor:pointer;transition:background .2s;align-self:center}
.login-card button:hover{background:#00a00d}

/* ===== MAIN APP ===== */
#appPage{display:none;height:100vh;overflow:hidden}
.app-header{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:#3a3a3a;border-bottom:1px solid #555}
.app-header .dev-name{font-size:20px;font-weight:800;display:flex;align-items:center;gap:12px}
.app-header .dev-name .avatar{width:48px;height:48px;background:#00C310;border-radius:8px}
.app-header .biz-name{font-size:22px;font-weight:700;color:#00C310;font-style:italic}

.app-body{display:flex;height:calc(100vh - 72px);overflow:hidden}

/* Sidebar */
.sidebar{width:80px;background:#3a3a3a;display:flex;flex-direction:column;align-items:center;padding-top:8px;gap:4px;border-right:1px solid #555;flex-shrink:0}
.sidebar .edit-icon{width:40px;height:40px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;cursor:pointer;color:#fff;font-size:20px}
.sidebar-icons{background:#00C310;border-radius:12px;padding:12px 8px;display:flex;flex-direction:column;gap:16px;align-items:center}
.sidebar-icons .nav-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;background:transparent;border:none;color:#fff;font-size:22px}
.sidebar-icons .nav-icon:hover{background:rgba(255,255,255,0.2)}
.sidebar-icons .nav-icon.active{background:rgba(255,255,255,0.3)}
.sidebar-icons .nav-icon.disabled{opacity:0.3;pointer-events:none;cursor:not-allowed}

/* Main content */
.main-content{flex:1;overflow-y:auto;padding:24px 32px;background:#3a3a3a}

/* ===== REWORKS PAGE (Page 1) ===== */
.workflow-dropdown{position:relative;display:inline-block;margin-bottom:24px}
.workflow-btn{background:#fff;color:#00C310;font-weight:700;font-size:16px;border:none;border-radius:24px;padding:10px 24px;cursor:pointer;display:flex;align-items:center;gap:8px}
.workflow-btn::after{content:'▼';font-size:12px}
.workflow-menu{display:none;position:absolute;top:100%;left:0;background:#fff;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.3);min-width:200px;z-index:100;overflow:hidden;margin-top:4px}
.workflow-menu.open{display:block}
.workflow-menu button{display:block;width:100%;text-align:left;padding:10px 20px;border:none;background:none;color:#333;font-size:14px;cursor:pointer;font-weight:600}
.workflow-menu button:hover{background:#e8ffe8;color:#00C310}

.reworks-layout{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.left-col{display:flex;flex-direction:column;gap:20px}

.field-label{font-weight:700;font-size:14px;margin-bottom:6px}
.field-input{width:100%;background:#3a3a3a;border:1px solid #666;border-radius:8px;padding:10px 14px;color:#fff;font-size:14px;outline:none;resize:none;font-family:inherit}
.field-input:focus{border-color:#00C310}

.site-comment-row{display:flex;gap:8px;align-items:flex-start}
.sc-no{width:60px;background:#3a3a3a;border:1px solid #666;border-radius:8px;padding:10px;color:#fff;font-size:14px;text-align:center;outline:none}
.sc-no:focus{border-color:#00C310}
.sc-text{flex:1;background:#3a3a3a;border:1px solid #666;border-radius:8px;padding:10px 14px;color:#fff;font-size:14px;outline:none;resize:none;min-height:70px;font-family:inherit}
.sc-text:focus{border-color:#00C310}

.add-btn{width:28px;height:28px;border-radius:50%;border:1px solid #666;background:#3a3a3a;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-left:auto;transition:all .2s}
.add-btn:hover{background:#00C310;border-color:#00C310}

.dev-note-row{display:flex;gap:8px;align-items:flex-start}
.dev-note-bullet{width:16px;height:16px;border-radius:50%;background:#00C310;margin-top:12px;flex-shrink:0}
.dev-note-text{flex:1;background:#3a3a3a;border:1px solid #666;border-radius:8px;padding:10px 14px;color:#fff;font-size:14px;outline:none;resize:none;min-height:70px;font-family:inherit}
.dev-note-text:focus{border-color:#00C310}

.copy-sc-btn{width:28px;height:28px;border-radius:50%;border:1px solid #666;background:#3a3a3a;color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-left:auto;transition:all .2s}
.copy-sc-btn:hover{background:#00C310;border-color:#00C310}

/* Final Note */
.final-note{background:#fff;border-radius:8px;overflow:hidden;height:fit-content}
.final-note-header{background:#00C310;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:14px}
.final-note-header .fn-actions{display:flex;gap:8px}
.final-note-header .fn-actions button{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:4px;transition:opacity .2s}
.final-note-header .fn-actions button:hover{opacity:0.7}
.final-note-body{padding:16px;color:#333;font-size:13px;min-height:400px;white-space:pre-wrap;line-height:1.6;max-height:60vh;overflow-y:auto}
.final-note-body[contenteditable=true]{outline:2px solid #00C310;background:#f0fff0}

/* ===== CHECKLIST PAGES (Pages 2 & 3) ===== */
.checklist-page{min-height:100%}
.checklist-page h1{font-size:28px;font-weight:900;margin-bottom:28px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:28px}
@media(max-width:900px){.grid3{grid-template-columns:1fr}}
.section{border:1px solid #555;border-radius:8px;overflow:hidden;background:#2a2a2a}
.section-header{padding:8px 16px;font-weight:700;font-size:14px}
.section-body{padding:12px;display:flex;flex-direction:column;gap:8px}
.item{display:flex;align-items:center;justify-content:space-between;gap:8px;border:1px solid #555;border-radius:6px;padding:8px 12px}
.item span{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.status-btn{border:none;padding:4px 12px;border-radius:4px;font-size:11px;font-weight:700;color:#fff;cursor:pointer;flex-shrink:0;transition:background .2s}
.status-ongoing{background:#dc3545}
.status-done{background:#00C310}
.charts{display:flex;flex-wrap:wrap;justify-content:center;gap:24px;margin-bottom:28px}
.chart-item{display:flex;flex-direction:column;align-items:center;gap:6px}
.chart-item span{font-size:12px;font-weight:600}
.yesno-btns{display:flex;gap:8px;margin-top:4px}
.yesno-btns button{border:none;padding:4px 16px;border-radius:4px;font-size:13px;font-weight:700;cursor:pointer;color:#fff;transition:background .2s}
.btn-yes{background:#555}
.btn-yes.active{background:#0088FF}
.btn-no{background:#555}
.btn-no.active{background:#dc3545}
.question{border:1px solid #555;border-radius:6px;padding:8px 12px;font-size:13px;margin-bottom:8px}
.cl-add-row{display:flex;gap:8px}
.cl-add-row input{flex:1;background:#2a2a2a;border:1px solid #555;border-radius:6px;padding:6px 12px;color:#fff;font-size:13px;outline:none}
.cl-add-row input::placeholder{color:#6b7b8d}
.cl-add-row button{background:#2a2a2a;border:1px solid #555;border-radius:6px;padding:6px 12px;color:#fff;font-size:13px;font-weight:700;cursor:pointer}
.cl-add-row button:hover{background:#444}
.legend-box{display:flex;align-items:center;gap:24px;padding:16px;border:1px solid #555;border-radius:8px;background:#2a2a2a}
.legend-item{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px}
.legend-sq{width:16px;height:16px;border-radius:3px;display:inline-block}
.save-btn{border:1px solid #555;background:#2a2a2a;color:#fff;padding:8px 32px;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;transition:background .2s}
.save-btn:hover{background:#444}
.bottom-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:28px}
@media(max-width:900px){.bottom-row{grid-template-columns:1fr}}
.info-banner{border:1px solid #555;border-radius:8px;background:#2a2a2a;padding:16px 20px;margin-bottom:24px;display:none}
.info-banner.visible{display:block}
.info-banner .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 24px}
.info-banner .info-item{font-size:13px}
.info-banner .info-label{color:#888;font-weight:700;font-size:11px;text-transform:uppercase}
.info-banner .info-val{color:#fff;word-break:break-all}
.info-banner .info-full{grid-column:1/-1}

/* ===== PARSER PAGE (Page 4) ===== */
.parser-page h1{font-size:24px;font-weight:900;margin-bottom:20px;color:#00C310}
.parser-page textarea{width:100%;height:200px;background:#2a2a2a;border:1px solid #555;border-radius:8px;color:#fff;padding:12px;font-size:13px;font-family:inherit;outline:none;resize:vertical;margin-bottom:12px}
.parser-page textarea:focus{border-color:#00C310}
.parser-controls{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.parser-controls button{background:#00C310;color:#fff;border:none;border-radius:6px;padding:8px 20px;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s}
.parser-controls button:hover{background:#00a00d}
.parser-controls input{background:#2a2a2a;border:1px solid #555;border-radius:6px;padding:8px 14px;color:#fff;font-size:13px;outline:none;margin-left:auto}
.parser-controls input:focus{border-color:#00C310}
.parser-table{width:100%;border-collapse:collapse;margin-top:16px}
.parser-table th,.parser-table td{border:1px solid #555;padding:8px 12px;text-align:left;font-size:13px;white-space:pre-wrap}
.parser-table th{background:#00C310;color:#fff;font-weight:700}
.parser-table tr:nth-child(odd) td{background:#2a2a2a}
.parser-table tr:nth-child(even) td{background:#333}
.parser-table .orange td:first-child,.parser-table .orange td:nth-child(2){background:#8B6914}
.parser-table .copy-cell button{background:#00C310;color:#fff;border:none;border-radius:4px;padding:4px 12px;cursor:pointer;font-size:12px;font-weight:700}
.parser-table .copy-cell button:hover{background:#00a00d}
#parserNewPages h2{color:#00C310;margin:20px 0 12px}
#parserNewPages table{width:100%;border-collapse:collapse}
#parserNewPages th{background:#00C310;color:#fff;padding:8px;font-size:13px}
#parserNewPages td{border:1px solid #555;padding:8px;font-size:13px;background:#2a2a2a}

/* Toast */
.toast{position:fixed;top:20px;right:20px;background:#00C310;color:#fff;padding:12px 24px;border-radius:8px;font-weight:700;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* ===== RESPONSIVE - MOBILE HAMBURGER ===== */
.mobile-menu-btn{display:none;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;padding:4px 8px;line-height:1}

@media(max-width:768px){
  /* Login */
  #loginPage h1{font-size:30px;margin-bottom:20px}
  .login-card{min-width:auto;width:90vw;max-width:380px;padding:28px 24px;gap:16px}
  .login-card input{padding:12px 14px;font-size:14px}
  .login-card button{padding:10px 28px;font-size:15px}

  /* Header */
  .app-header{padding:8px 12px;flex-wrap:wrap;gap:8px}
  .app-header .dev-name{font-size:16px;gap:8px}
  .app-header .dev-name .avatar{width:36px;height:36px}
  .app-header .biz-name{font-size:16px}
  .mobile-menu-btn{display:block}

  /* Body & Sidebar */
  body{overflow:auto}
  #appPage{overflow:auto;height:auto;min-height:100vh}
  .app-body{flex-direction:column;height:auto;min-height:calc(100vh - 60px);overflow:visible}
  .sidebar{width:100%;flex-direction:row;padding:8px 12px;gap:0;border-right:none;border-bottom:1px solid #555;overflow-x:auto;display:none}
  .sidebar.open{display:flex}
  .sidebar-icons{flex-direction:row;border-radius:8px;padding:8px 12px;gap:8px;width:100%;justify-content:center}
  .sidebar-icons .nav-icon{width:40px;height:40px}

  /* Main content */
  .main-content{padding:16px 12px;overflow-y:visible}

  /* Reworks layout */
  .reworks-layout{grid-template-columns:1fr;gap:16px}

  /* Final note */
  .final-note-body{min-height:200px;max-height:50vh}

  /* Parser */
  .parser-page textarea{height:140px}
  .parser-controls{flex-direction:column;align-items:stretch}
  .parser-controls input{margin-left:0;width:100%}
  .parser-controls button{width:100%}
  .parser-table th,.parser-table td{padding:6px 8px;font-size:12px}
  #parserNewPages th,#parserNewPages td{padding:6px;font-size:12px}

  /* Checklist grids */
  .grid3{grid-template-columns:1fr;gap:12px}
  .bottom-row{grid-template-columns:1fr;gap:12px}
  .checklist-page h1{font-size:22px;margin-bottom:16px}

  /* Charts */
  .charts{gap:12px}
  .chart-item canvas{width:70px!important;height:70px!important}

  /* Info banner */
  .info-banner .info-grid{grid-template-columns:1fr}

  /* Legend */
  .legend-box{flex-direction:column;gap:12px;align-items:flex-start}

  /* Items */
  .item span{white-space:normal;font-size:12px}
  .status-btn{font-size:10px;padding:4px 8px}

  /* Toast */
  .toast{top:auto;bottom:20px;right:12px;left:12px;text-align:center}
}

@media(max-width:480px){
  #loginPage h1{font-size:26px}
  .login-card{padding:24px 18px}
  .app-header .dev-name{font-size:14px}
  .app-header .biz-name{font-size:14px}
  .field-label{font-size:13px}
  .workflow-btn{font-size:14px;padding:8px 18px}
  .site-comment-row{flex-direction:column;gap:6px}
  .sc-no{width:100%}
}
</style>
</head>
<body>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<!-- ===== LOGIN PAGE ===== -->
<div id="loginPage">
  <h1>WeBuild</h1>
  <div class="login-card">
    <input type="text" id="loginName" placeholder="Enter Your Name:"/>
    <input type="text" id="loginBiz" placeholder="Business Name"/>
    <button onclick="doLogin()">Start Now!</button>
  </div>
</div>

<!-- ===== APP PAGE ===== -->
<div id="appPage">
  <div class="app-header">
    <div class="dev-name">
      <div class="avatar"></div>
      <span id="headerName">ENTERED NAME</span>
    </div>
    <div class="biz-name" id="headerBiz" style="color:#66FF70">Business Name</div>
    <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
  </div>
  <div class="app-body">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-icons">
        <button class="nav-icon active" onclick="switchPage(0)" title="Notes" id="navBtn0"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></button>
        <button class="nav-icon" onclick="switchPage(1)" title="New Build Checklist" id="navBtn1"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 12l2 2 4-4"/></svg></button>
        <button class="nav-icon" onclick="switchPage(2)" title="Website Upgrade Checklist" id="navBtn2"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg></button>
        <button class="nav-icon" onclick="switchPage(3)" title="Parser" id="navBtn3"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
      </div>
    </div>

    <!-- Page containers -->
    <div class="main-content" id="mainContent">
      <!-- Page 0: Reworks -->
      <div id="page0">
        <div class="workflow-dropdown">
          <button class="workflow-btn" onclick="toggleWorkflowMenu()" id="workflowBtn">Select Workflow</button>
          <div class="workflow-menu" id="workflowMenu">
            <button onclick="selectWorkflow('New Build')">New Build</button>
            <button onclick="selectWorkflow('Rebuild')">Rebuild</button>
            <button onclick="selectWorkflow('Website Upgrade')">Website Upgrade</button>
            <button onclick="selectWorkflow('Reworks')">Reworks</button>
            <button onclick="selectWorkflow('Change Request')">Change Request</button>
          </div>
        </div>

        <div class="reworks-layout">
          <div class="left-col">
            <div>
              <div class="field-label">Preview Link:</div>
              <input type="text" class="field-input" id="previewLink" placeholder="https://..."/>
            </div>

            <div>
              <div class="field-label">Site Comments:</div>
              <div class="site-comment-row">
                <input type="text" class="sc-no" id="scNo" placeholder="No."/>
                <textarea class="sc-text" id="scText" placeholder="Enter site comment..."></textarea>
              </div>
              <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:6px">
                <button class="add-btn" onclick="addSiteComment()" title="Add to Final Note">+</button>
              </div>
            </div>

            <div>
              <div class="field-label">Developer Notes:</div>
              <div class="dev-note-row">
                <div class="dev-note-bullet"></div>
                <textarea class="dev-note-text" id="devNoteText" placeholder="Enter developer note..."></textarea>
              </div>
              <div style="display:flex;justify-content:flex-end;margin-top:6px">
                <button class="add-btn" onclick="addDevNote()" title="Add to Final Note">+</button>
              </div>
            </div>
          </div>

          <div class="final-note">
            <div class="final-note-header">
              <span>Final Note</span>
              <div class="fn-actions">
                <button onclick="toggleEditFinalNote()" title="Edit">✏️</button>
                <button onclick="copyFinalNote()" title="Copy all">📋</button>
              </div>
            </div>
            <div class="final-note-body" id="finalNoteBody"></div>
          </div>
        </div>

        <!-- Workflow Charts -->
        <div id="workflowCharts" class="charts" style="display:none;margin-top:24px"></div>
      </div>

      <!-- Page 1: New Build Checklist -->
      <div id="page1" style="display:none" class="checklist-page"></div>

      <!-- Page 2: Website Upgrade Checklist -->
      <div id="page2" style="display:none" class="checklist-page"></div>

      <!-- Page 3: Parser -->
      <div id="page3" style="display:none" class="parser-page">
        <h1>Onboarding Parser</h1>
        <textarea id="parserInput" rows="12" placeholder="Paste your document here..."></textarea>
        <div class="parser-controls">
          <button onclick="parseDocument()">Parse Document</button>
          <button onclick="exportParserCSV()">Download CSV</button>
          <input type="text" id="parserSearch" placeholder="Search..." oninput="filterParserTable()"/>
        </div>
        <table class="parser-table" id="parserTable">
          <thead><tr><th>Field</th><th>Detail</th><th>Copy</th></tr></thead>
          <tbody id="parserBody"></tbody>
        </table>
        <div id="parserNewPages"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ===== GLOBAL STATE =====
let appState = {
  devName: '',
  bizName: '',
  workflow: '',
  previewLink: '',
  siteComments: [],
  devNotes: [],
  finalNoteContent: ''
};

// ===== LOGIN =====
function doLogin() {
  const name = document.getElementById('loginName').value.trim();
  const biz = document.getElementById('loginBiz').value.trim();
  if (!name) { document.getElementById('loginName').focus(); return; }
  if (!biz) { document.getElementById('loginBiz').focus(); return; }
  appState.devName = name;
  appState.bizName = biz;
  document.getElementById('headerName').textContent = name.toUpperCase();
  document.getElementById('headerBiz').textContent = biz;
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('appPage').style.display = 'block';
  updateFinalNote();
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ===== SIDEBAR NAV =====
let currentPage = 0;
function switchPage(idx) {
  const btn = document.getElementById('navBtn' + idx);
  if (btn.classList.contains('disabled')) return;
  currentPage = idx;
  for (let i = 0; i < 4; i++) {
    document.getElementById('page' + i).style.display = i === idx ? 'block' : 'none';
    document.getElementById('navBtn' + i).classList.toggle('active', i === idx);
  }
  if (idx === 1 && !nb_rendered) renderNewBuildChecklist();
  if (idx === 2 && !up_rendered) renderUpgradeChecklist();
}

// ===== WORKFLOW =====
function toggleWorkflowMenu() {
  document.getElementById('workflowMenu').classList.toggle('open');
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.workflow-dropdown')) {
    document.getElementById('workflowMenu').classList.remove('open');
  }
});

function selectWorkflow(wf) {
  appState.workflow = wf;
  document.getElementById('workflowBtn').textContent = wf;
  document.getElementById('workflowMenu').classList.remove('open');

  // New Build disables 3rd menu (Website Upgrade idx=2)
  // Website Upgrade disables 2nd menu (New Build idx=1)
  const btn1 = document.getElementById('navBtn1');
  const btn2 = document.getElementById('navBtn2');
  btn1.classList.remove('disabled');
  btn2.classList.remove('disabled');

  if (wf === 'New Build') {
    btn2.classList.add('disabled');
    if (currentPage === 2) switchPage(0);
  } else if (wf === 'Website Upgrade') {
    btn1.classList.add('disabled');
    if (currentPage === 1) switchPage(0);
  } else if (wf === 'Change Request' || wf === 'Reworks') {
    btn1.classList.add('disabled');
    btn2.classList.add('disabled');
    if (currentPage === 1 || currentPage === 2) switchPage(0);
  }
  updateFinalNote();
  renderWorkflowCharts();
}

let _renderingWorkflowCharts = false;
function renderWorkflowCharts() {
  if (_renderingWorkflowCharts) return;
  _renderingWorkflowCharts = true;
  const container = document.getElementById('workflowCharts');
  container.innerHTML = '';
  const wf = appState.workflow;
  let chartData = null;

  if (wf === 'New Build') {
    chartData = clGetNBChartData();
  } else if (wf === 'Website Upgrade') {
    chartData = clGetUpChartData();
  }

  if (!chartData) { container.style.display = 'none'; _renderingWorkflowCharts = false; return; }
  container.style.display = 'flex';

  chartData.forEach(s => {
    const w = document.createElement('div'); w.className = 'chart-item';
    const c = document.createElement('canvas'); c.width = 100; c.height = 100;
    const done = s.items.filter(i => i.status === 'Done').length;
    clDrawDonut(c, done, s.items.length, s.color);
    const l = document.createElement('span'); l.textContent = s.label;
    w.append(c, l); container.appendChild(w);
  });
  _renderingWorkflowCharts = false;
}

// ===== SHARED CHECKLIST HELPERS =====
function clMakeItem(item, rerender) {
  const div = document.createElement('div'); div.className = 'item';
  const sp = document.createElement('span'); sp.textContent = item.name;
  const btn = document.createElement('button');
  btn.className = 'status-btn ' + (item.status === 'Done' ? 'status-done' : 'status-ongoing');
  btn.textContent = item.status;
  btn.onclick = () => { item.status = item.status === 'Ongoing' ? 'Done' : 'Ongoing'; rerender(); };
  div.append(sp, btn); return div;
}

function clMakeSection(cat, items, rerender) {
  const sec = document.createElement('div'); sec.className = 'section';
  const hdr = document.createElement('div'); hdr.className = 'section-header'; hdr.textContent = cat.label; hdr.style.background = cat.color;
  const body = document.createElement('div'); body.className = 'section-body';
  items.forEach(it => body.appendChild(clMakeItem(it, rerender)));
  sec.append(hdr, body); return sec;
}

function clDrawDonut(canvas, done, total, color) {
  const ctx = canvas.getContext('2d'), cx = 50, cy = 50, r = 38, lw = 8;
  const pct = total === 0 ? 0 : done / total;
  ctx.clearRect(0, 0, 100, 100);
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, 2 * Math.PI); ctx.strokeStyle = '#555'; ctx.lineWidth = lw; ctx.stroke();
  if (total > 0) { ctx.beginPath(); ctx.arc(cx, cy, r, -Math.PI / 2, -Math.PI / 2 + 2 * Math.PI * pct); ctx.strokeStyle = color; ctx.lineWidth = lw; ctx.lineCap = 'round'; ctx.stroke(); }
  ctx.fillStyle = '#fff'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(Math.round(pct * 100) + '%', cx, cy);
}

// ===== SAVE CHECKLIST PDF =====
function saveChecklistPDF(mode) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  let y = 14;

  doc.setFontSize(18);
  doc.text(mode === 'newbuild' ? 'New Build Checklist' : 'Web Upgrade Checklist', 14, y); y += 10;
  doc.setFontSize(10); doc.setTextColor(100);

  doc.text('Developer Name: ' + appState.devName, 14, y); y += 6;
  doc.text('Business Name: ' + appState.bizName, 14, y); y += 6;

  const devNotesText = appState.devNotes.map(n => '• ' + n).join('\n');
  if (devNotesText) {
    doc.text('Dev Notes:', 14, y); y += 5;
    const lines = doc.splitTextToSize(devNotesText, 180);
    doc.text(lines, 14, y); y += lines.length * 5;
  }

  const link = document.getElementById('previewLink').value.trim();
  if (link) { doc.text('Preview Link: ' + link, 14, y); y += 6; }

  doc.setTextColor(0); y += 6;

  const sections = [];
  if (mode === 'newbuild') {
    ['onboarding','website','contact','mobile'].forEach(k => sections.push({ category: nb_data[k].label, items: nb_data[k].items }));
    if (nb_blogsAnswer) sections.push({ category: 'Blogs', items: nb_blogsAnswer === 'yes' ? nb_blogsYes : nb_blogsNo });
    if (nb_dynamicAnswer) sections.push({ category: 'Dynamic Pages', items: nb_dynamicAnswer === 'yes' ? nb_dynamicYes : nb_dynamicNo });
    if (nb_devNotes.length) sections.push({ category: 'Notes for Developer', items: nb_devNotes });
  } else {
    ['onboarding','website','mobile'].forEach(k => sections.push({ category: up_data[k].label, items: up_data[k].items }));
    if (up_manualAnswer) sections.push({ category: 'Manual Upgrade', items: up_manualAnswer === 'yes' ? up_data.manual.items : up_manualNo });
    if (up_devNotes.length) sections.push({ category: 'Notes for Developer', items: up_devNotes });
  }

  sections.forEach(s => {
    doc.setFontSize(13); doc.text(s.category, 14, y); y += 4;
    doc.autoTable({
      startY: y, head: [['Item', 'Status']], body: s.items.map(i => [i.name, i.status]),
      theme: 'grid', headStyles: { fillColor: [40, 40, 40] }, styles: { fontSize: 10 },
      didParseCell(d) { if (d.column.index === 1 && d.section === 'body') { d.cell.styles.textColor = d.cell.raw === 'Done' ? [0, 195, 16] : [220, 50, 50]; d.cell.styles.fontStyle = 'bold'; } }
    });
    y = doc.lastAutoTable.finalY + 10;
  });

  const initials = appState.devName ? appState.devName.split(/\s+/).map(w => w[0]).join('').toUpperCase() : '';
  const biz = appState.bizName || '';
  let fileName = (mode === 'newbuild' ? 'build' : 'upgrade') + '-checklist';
  if (initials || biz) fileName = (initials && biz ? initials + '-' + biz : initials || biz).replace(/[^a-zA-Z0-9\-_ ]/g, '');
  doc.save(fileName + '.pdf');
}

];

const parserOrangeFields = [
  "Is the client having dynamic pages?",
  "If a CSV is not being provided prior to build please list one product details below",
  "What payment options do you offer?",
  "Does the client want prices shown on their catalogue store?",
  "Is the client having Localsearch Chat?",
  "Is the client having Localsearch Bookings?"
];

const parserYesNoFields = [
  "Would you like your email address displayed on your website?",
  "Do you have testimonials?"
];

function parseDocument() {
  const inputText = document.getElementById('parserInput').value;
  const outputBody = document.getElementById('parserBody');
  const newPagesContainer = document.getElementById('parserNewPages');
  outputBody.innerHTML = '';
  newPagesContainer.innerHTML = '';

  const lines = inputText.split('\n');
  const results = {};
  const cxSalesPattern = /^(CX|Sales)$/;
  const dateTimePattern = /^\d{2}\/\d{2}\/\d{4} \d{2}:\d{2}:\d{2}$/;
  let currentField = null;
  let multiLineDetail = '';
  let newItems = [];
  let currentFieldDateTime = {};
  let lastField = null;

  for (let i = 0; i < lines.length; i++) {
    const trimmedLine = lines[i].trim();
    if (!trimmedLine) continue;
    if (dateTimePattern.test(trimmedLine)) { if (lastField) currentFieldDateTime[lastField] = trimmedLine; continue; }
    if (cxSalesPattern.test(trimmedLine)) { if (currentField) { results[currentField] = multiLineDetail.trim(); lastField = currentField; currentField = null; multiLineDetail = ''; } continue; }
    if (parserFields.includes(trimmedLine)) { if (currentField) { results[currentField] = multiLineDetail.trim(); lastField = currentField; } currentField = trimmedLine; multiLineDetail = ''; continue; }
    if (currentField) multiLineDetail += trimmedLine + '\n';
    if (/^Item \d+ Action$/i.test(trimmedLine)) {
      const itemNumber = trimmedLine.match(/^Item (\d+)/)?.[1];
      const action = lines[i + 1]?.trim() || 'Unknown';
      const itemNameIndex = lines.findIndex(line => line.trim() === `Item ${itemNumber} Name`);
      const itemName = itemNameIndex !== -1 ? lines[itemNameIndex + 1]?.trim() : 'Unknown';
      const anchorLinksIndex = lines.findIndex(line => line.trim().toLowerCase() === `item ${itemNumber} anchor links`);
      const anchorLinks = anchorLinksIndex !== -1 ? lines[anchorLinksIndex + 1]?.trim() : 'NA';
      const parent = lines[i - 9]?.trim() || 'NA';
      const type = lines[i - 4]?.trim() || 'NA';
      const timestamp = lines[i - 1]?.trim() || '';
      newItems.push({ itemName, parent, type, anchorLinks, timestamp, action });
    }
  }
  if (currentField) { results[currentField] = multiLineDetail.trim(); lastField = currentField; }

  if (results['ABN']) results['ABN'] = formatABN(results['ABN']);
  if (results['ACN']) results['ACN'] = formatACN(results['ACN']);

  for (const [field, detail] of Object.entries(results)) {
    const tr = document.createElement('tr');
    const isOrange = parserOrangeFields.includes(field);
    if (isOrange) tr.className = 'orange';

    const td1 = document.createElement('td');
    td1.innerHTML = '<strong>' + field + '</strong>';
    const td2 = document.createElement('td');
    td2.textContent = detail;

    if (parserYesNoFields.includes(field)) {
      td2.style.background = detail.toLowerCase() === 'yes' ? '#1a6b1a' : '#6b1a1a';
    }

    const td3 = document.createElement('td');
    td3.className = 'copy-cell';
    const copyBtn = document.createElement('button');
    copyBtn.textContent = 'Copy';
    copyBtn.onclick = () => { navigator.clipboard.writeText(detail).then(() => showToast('Copied: ' + detail.substring(0, 40))); };
    td3.appendChild(copyBtn);

    tr.append(td1, td2, td3);
    outputBody.appendChild(tr);
  }

  if (newItems.length > 0) {
    const table = document.createElement('table');
    table.className = 'parser-table';
    table.innerHTML = '<thead><tr><th>Item Name</th><th>Parent</th><th>Type</th><th>Anchor Links</th><th>Date & Time</th><th>Action</th></tr></thead><tbody>' +
      newItems.map(item => `<tr><td>${item.itemName}</td><td>${item.parent}</td><td>${item.type}</td><td>${item.anchorLinks}</td><td>${item.timestamp}</td><td>${item.action}</td></tr>`).join('') + '</tbody>';
    newPagesContainer.innerHTML = '<h2>Pages / New Pages</h2>';
    newPagesContainer.appendChild(table);

    // Add Date Updated column to main table
    const mainTable = document.getElementById('parserTable');
    const headerRow = mainTable.querySelector('thead tr');
    const alreadyExists = Array.from(headerRow.children).some(th => th.textContent === 'Date Updated');
    if (!alreadyExists) {
      const newHeader = document.createElement('th'); newHeader.textContent = 'Date Updated'; headerRow.appendChild(newHeader);
      mainTable.querySelectorAll('tbody tr').forEach(row => {
        const field = row.querySelector('td:first-child').textContent.trim();
        const dateCell = document.createElement('td');
        dateCell.textContent = currentFieldDateTime[field] || '';
        row.appendChild(dateCell);
      });
    }
  }

  if (outputBody.childNodes.length === 0) {
    const tr = document.createElement('tr');
    const td = document.createElement('td');
    td.setAttribute('colspan', '3');
    td.textContent = 'No important details found.';
    tr.appendChild(td);
    outputBody.appendChild(tr);
  }
}

function filterParserTable() {
  const val = document.getElementById('parserSearch').value.toLowerCase();
  document.querySelectorAll('#parserBody tr').forEach(row => {
    const text = row.textContent.toLowerCase();
    row.style.display = text.includes(val) ? '' : 'none';
  });
}

function formatABN(abn) {
  const cleaned = abn.replace(/\D/g, '');
  return cleaned.length === 11 ? cleaned.replace(/(\d{2})(\d{3})(\d{3})(\d{3})/, '$1 $2 $3 $4') : abn;
}

function formatACN(acn) {
  return acn.replace(/\D/g, '').replace(/(\d{3})(\d{3})(\d{3})/, '$1 $2 $3');
}

function exportParserCSV() {
  const rows = [];
  const table = document.getElementById('parserTable');
  for (let row of table.rows) {
    const cells = [];
    for (let cell of row.cells) cells.push('"' + cell.textContent.replace(/\n/g, '\r\n') + '"');
    rows.push(cells.join(','));
  }
  const blob = new Blob([rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.setAttribute('download', 'parsed_data.csv');
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}
